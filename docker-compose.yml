services:

  consul:
    image: hashicorp/consul:1.20
    ports:
      - "8500:8500"
    command: agent -dev -client=0.0.0.0

  slash:
    build: guitar-hero-service
    ports:
      - "9000:9000"
    environment:
      GUITAR_HERO_NAME: Slash
      GUITAR_HERO_PORT: 9000
      GUITAR_HERO_DELAY_MS: 300
      GUITAR_HERO_FAILURE_RATIO: 0
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    depends_on:
      - consul

  hendrix:
    build: guitar-hero-service
    ports:
      - "9001:9001"
    environment:
      GUITAR_HERO_NAME: Hendrix
      GUITAR_HERO_PORT: 9001
      GUITAR_HERO_DELAY_MS: 500
      GUITAR_HERO_FAILURE_RATIO: 0
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    depends_on:
      - consul

  eddie:
    build: guitar-hero-service
    ports:
      - "9002:9002"
    environment:
      GUITAR_HERO_NAME: Eddie
      GUITAR_HERO_PORT: 9002
      GUITAR_HERO_DELAY_MS: 5
      GUITAR_HERO_FAILURE_RATIO: 20
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    depends_on:
      - consul

  dispatcher-quarkus:
    build: dispatcher-quarkus
    ports:
      - "8080:8080"
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    depends_on:
      - consul
      - slash
      - hendrix
      - eddie

  dispatcher-spring:
    build: dispatcher-spring
    ports:
      - "8081:8081"
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    depends_on:
      - consul
      - slash
      - hendrix
      - eddie

  ui:
    build: ui
    ports:
      - "8082:8082"
    environment:
      DISPATCHER_QUARKUS_HOST: dispatcher-quarkus
      DISPATCHER_QUARKUS_PORT: 8080
      DISPATCHER_SPRING_HOST: dispatcher-spring
      DISPATCHER_SPRING_PORT: 8081
    depends_on:
      - dispatcher-quarkus
      - dispatcher-spring
